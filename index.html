<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Bebe hermosa</title>
    <style>
        body {
            background: radial-gradient(circle at center, #0a192f 0%, #000205 100%);
            color: #fff9c4;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            color: #fdd835;
            text-shadow: 0 0 20px rgba(253, 216, 53, 0.8);
            margin: 30px 0 10px 0;
            line-height: 1.4;
        }

        .subtitulo {
            font-size: 1.1rem;
            color: #fdd835;
            opacity: 0.9;
            margin: 5px 0;
            font-style: italic;
            text-align: center;
        }

        #contenedor-lista {
            width: 100%;
            max-width: 380px;
            z-index: 2;
            padding-top: 20px;
            padding-bottom: 120px;
        }

        .plan-item {
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 15px;
            border-left: 4px solid #fdd835;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            animation: fadeIn 0.8s forwards;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .luciernaga {
            position: fixed;
            pointer-events: none;
            fill: #fdd835;
            filter: drop-shadow(0 0 10px #fdd835);
            z-index: 1;
            opacity: 0;
            animation: flotar 6s ease-in-out forwards;
        }

        @keyframes flotar {
            0% { transform: translateY(110vh) translateX(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateY(50vh) translateX(30px) scale(1); }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(-20px) scale(0.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="titulo"></h1>
    <div id="sub1" class="subtitulo"></div>
    <div id="sub2" class="subtitulo"></div>
    
    <div id="contenedor-lista"></div>

    <script>
        const planes = [
            "1. Lo que más quiero es un dia contigo donde el tiempo no importe. Poder abrazarte, mirarte de cerca y llenarte de besitos y recuperar todo el tiempo que no hemos podido hacerlo 🥺",
            "2. También un día donde solo estemos tu y yo Besándonos sin parar, abrazándonos sin soltarnos y admirando de cerquita esos ojitos tan preciosos que tienes y que me encantan demasiado y robándote todos los besitos que están reservados solo para tiii",
            "3. Molestarte con mis locuras, haciéndote reír y jugar entre nosotros para reírnos y disfrutar juntos y poder amar y disfrutar al máximo cada segundo que pasa a tu lado",
            "4. Podríamos hacer algo sencillo no importaría lo que fuera por que desde que sea contigo para mi es suficiente y no importa lo demás, por que así nos tocara en la puerta de tu casita yo de igual manera amaría ese ratico que estemos juntos o acompañarte mientras hace algún trabajo de la uní no, importaría tampoco o si es lo más pequeñito, por que lo único que importa es poder estar a tu ladito, compartiendo cada segundo junticos",
            "5. Salir a lugares bonitos y conocer nuevos riconcitos juntos, ver el paisaje, crear momentos únicos e inolvidables, que se queden con nosotros, pasarla increíble tu y yo, tomarnos muchas foticos juntos y tener muchos recuerdos de nuestras aventuras y guardar cada recuerdo que creemos juntos y que nunca olvidemos 🥺🥹",
            "6. Hablar de todo, de la vida de como fue que la vida nos junto y nos puso en el mismo camino y llenarnos de recuerdos valiosos de cuando nos estábamos conociendo y a medida, que los días pasaban nos fuimos dando cuenta que estamos destinados a estar Juntos y poder compartir mis días contigo es lo que mas amo y adoro, por que yo a ti no solo te amo, yo te adoro y siempre te voy a cuidar como mereces y como la princesa que eres 🥹💓",
            "7. Conocernos más como ya habíamos hablado mi vidaa. Conocer tus temores, lo que te enoja, lo que te pone triste o celosa descubrir cada detalle de ti, tus gustos y tus pensamientos. y enamorarme aún más de todo lo que eres y de todo lo que te hace ser tú, sintiéndome cada vez más cerquita de tii 🥺✨️",
            "8. Hacer una noche de pelis comprar gomitas, dulces y papitas y quedarnos disfrutando junticos 🥹",
            "9. Cocinar junticos me ilusiona muchísimo que preparemos algo rico y tomar foticos de nuestra preparación y de lo bonito que nos veremos cocinando juntos y disfrutar de segundo a segundo ese plan de pareja",
            "10. Mi amor días en el que solo hagamos arrunchis y no soltarnos en todo el día y no dejar de consentirte y besarte",
            "11. Ir donde podamos quedarnos mirando el cielo, abrazaditos y hablando de lo hermoso que es estar juntos 😻✨️",
            "12. Hermoso que vayamos a un parquesito, estemos agarrados de las manitos y sentarnos en un árbolito bajo el sol haciéndote masajes y consintiendote la espalda mientras la llenos de besitos 🥹",
            "13. Me gustaría que saliéramos a comer algo rico o si tienes antojo de algo en especial, ir y consentirte, mientras disfrutamos de ese momento juntos 🥺💜",
            "14. Que salgamos a un centro comercial, recorrerlo todo, caminar, reirnos, comer postrecito y pasarla muy Lindoo",
            "15. Que vayamos a cine me encantaría sería muy feliz poder ver alguna pelí que este en cartelera y comprar comidita y agarrados de las manos mientras vemos la peli 🥰",
            "16. Mivida ir a comer heladito, compartirnos para probar de nuestros sabores, sentarnos en algún lugar, hacerte reír y quedarnos disfrutando del paisaje",
            "17. Seria hermoso ir a un mirador, tomar cafécito, mientras esperamos el atardecer, verlo juntos, tomarnos fotos con ese fondo tan bonito y quedarnos en silencio un ratito, sintiendo lo hermoso y especial que es la vida estando Junticos 🥺🥹✨️",
            "18. Que hagamos un picnic llevar comidita y también dulces, y llevar para pintar unos cuadritos y pasar un momento desconectados de todo y solo estar tu y yo",
            "19. Que escuchemos música mi amoorr que nos haga el momento mas bonito y estés acostada en mi pecho mientras te consiento y te las canto dedicandotelas expresando todo lo que siento por tii 🥺✨️",
            "20. Tomarnos foticos y también ver fotos junticos, mostrarte todas las fotos de cuando era pequeño y de ahorita de cada recuerdo que tengo, y crear nuevos momentos pero contigo 💞",
            "21. Que nos quedemos hablando hasta tarde sin darnos cuenta de la hora, perdernos en el tiempo, solo disfrutando el momento de estar compartiendo juntos y disfrutando",
            "22. Ver las estrellas junticos mientras vemos la Cuidad y el ruido de las aves y que encontremos ese lugar bonito para admirar la noche. y lo bonita que igual que tus ojitos",
            "23. Un día donde jugemos los dos y nos divirtamos, nos riamos qué sea único entre nosotros",
            "24. Amorr que hagamos muchas salidas, como ir a jugar bolos, ir a un parque de diversiones, tener un dia solo de nosotros, hacer algo fuera de lo común y disfrutar al máximo, ir a parque acuático y poder disfrutarnos cada etapa y cada salida como pareja 🥹🥹🥰",
            "25. A mi me encantará como plan mio hacia tii sorprenderte con algún detalle, alguna carta solo por existir y lo hermosa que eres y para verte sonreír que es lo que amaría y amare Cada dia de mi vida"
        ];

        const textoH1 = "Estos son los planes que quiero hacer solo contigo";
        const textoSub1 = "Mii Bebe hermosa";
        const textoSub2 = "Mii persona favorita";

        async function escribirEfecto(elemento, texto, velocidad) {
            for (let i = 0; i < texto.length; i++) {
                elemento.innerHTML += texto[i];
                await new Promise(r => setTimeout(r, velocidad));
            }
        }

        async function iniciar() {
            await escribirEfecto(document.getElementById('titulo'), textoH1, 50);
            await new Promise(r => setTimeout(r, 400));
            await escribirEfecto(document.getElementById('sub1'), textoSub1, 40);
            await new Promise(r => setTimeout(r, 300));
            await escribirEfecto(document.getElementById('sub2'), textoSub2, 40);
            await new Promise(r => setTimeout(r, 800));
            
            const contenedor = document.getElementById('contenedor-lista');
            for (let plan of planes) {
                const div = document.createElement('div');
                div.className = 'plan-item';
                div.style.display = 'block';
                div.innerHTML = plan;
                contenedor.appendChild(div);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                await new Promise(r => setTimeout(r, 2000)); 
            }
        }

        function crearCorazon() {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 24 24");
            svg.classList.add("luciernaga");
            svg.innerHTML = '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>';
            svg.style.left = Math.random() * 90 + "vw";
            svg.style.width = (Math.random() * 15 + 12) + "px";
            svg.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(svg);
            setTimeout(() => svg.remove(), 6000);
        }

        iniciar();
        setInterval(crearCorazon, 400);
    </script>
</body>
</html>
